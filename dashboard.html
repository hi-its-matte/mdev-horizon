<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard — Meteo</title>
  <link rel="stylesheet" href="/css/app.css">
  <meta name="theme-color" content="#050507">
</head>
<body>
  <header class="topbar">
    <div class="brand">Meteo</div>
    <nav>
      <button id="profileBtn" class="link">Profilo</button>
      <button id="logoutBtn" class="link">Esci</button>
    </nav>
  </header>

  <main class="container">
    <section class="search">
      <input id="cityInput" placeholder="Inserisci una città" />
      <button id="searchBtn" class="btn-primary">Cerca</button>
    </section>

    <section id="weatherCard" class="card weather-card">
      <div id="loading">Caricamento meteo...</div>
      <div id="weather" style="display:none">
        <h2 id="place"></h2>
        <div id="temp" class="temp"></div>
        <div id="desc" class="muted"></div>
        <div id="details" class="muted small"></div>
      </div>
    </section>

    <section id="forecastSection" class="card forecast-section" style="display:none">
      <h3>Previsioni prossimi giorni</h3>
      <div id="forecastGrid" class="forecast-grid"></div>
    </section>
  </main>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
