<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — MatteDev</title>
    <link rel="stylesheet" href="/css/app.css">
    <meta name="theme-color" content="#050507">
</head>
<body class="auth-page">
    <main class="page-shell">
        <section class="auth-card">
            <div>
                <h1 class="auth-title" id="authTitle">Bentornato</h1>
                <p class="auth-subtitle" id="authSub">Accedi al tuo account per continuare.</p>
            </div>

            <div class="auth-tabs">
                <button type="button" class="tab-btn active" id="tabLogin" onclick="setMode(true)">Accedi</button>
                <button type="button" class="tab-btn" id="tabRegister" onclick="setMode(false)">Registrati</button>
            </div>

            <div class="auth-fields">
                <div class="field-group hidden" id="usernameWrapper">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="il_tuo_username" autocomplete="username">
                </div>

                <div class="field-group visible">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="latua@email.com" autocomplete="email">
                </div>

                <div class="field-group visible">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                </div>

                <button type="button" class="btn-primary auth-submit" id="authBtn">Accedi</button>
                <div class="msg" id="authMsg" aria-live="polite"></div>
            </div>

            <div class="auth-footer">
                <a href="https://privacy.mattedev.com/privacy.html">Privacy Policy</a>
                <span class="auth-divider"></span>
                <a href="https://privacy.mattedev.com/terms.html">Termini di Servizio</a>
                <span class="auth-divider"></span>
                <a href="mailto:support@mattedev.com">Supporto</a>
            </div>
        </section>
    </main>

    <script type="module" src="/auth.js"></script>
</body>
</html>
