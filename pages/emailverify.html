<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifica Email — MatteDev</title>
    <link rel="stylesheet" href="/css/app.css">
    <meta name="theme-color" content="#050507">
</head>
<body class="auth-page">
    <main class="center-screen">
        <section class="verify-card">
            <div class="auth-brand">
                <div class="brand-mark">MD</div>
                <div class="brand-copy">
                    <div class="brand-name">MatteDev</div>
                    <div class="brand-note">Conferma account richiesta</div>
                </div>
            </div>

            <div>
                <h1 class="verify-title">Conferma la tua email</h1>
                <p class="verify-copy">Ti abbiamo inviato un link di verifica. Controlla la posta in arrivo, e se non lo vedi prova anche nella cartella spam.</p>
            </div>

            <div class="verify-badge">Account in attesa di conferma</div>

            <div class="verify-actions">
                <button type="button" id="resendEmail" class="btn-primary">Reinvia email</button>
                <button type="button" id="logoutBtn" class="btn-secondary">Esci</button>
            </div>

            <div class="msg" id="verifyMsg" aria-live="polite"></div>

            <div class="verify-footer">
                <a href="/pages/login.html">Torna al login</a>
                <span class="auth-divider"></span>
                <a href="mailto:support@mattedev.com">Serve aiuto?</a>
            </div>
        </section>
    </main>

    <script type="module" src="/auth.js"></script>
</body>
</html>
